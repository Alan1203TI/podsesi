<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PODSESI Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body student-page">
  <div class="school-bg"></div>
  <main class="spotify-tablet">
    <aside class="left-menu">
      <div class="logo-box">
        <img src="./assets/logo-podsesi.png" onerror="this.onerror=null;this.src='./logo-podsesi.png';" alt="PODSESI" />
      </div>
      <nav class="menu-list" aria-label="Menu principal">
        <button class="menu-item active" data-menu="inicio"><span>⌂</span>Início</button>
        <button class="menu-item" data-menu="explorar"><span>◉</span>Explorar</button>
        <button class="menu-item" data-menu="categorias"><span>▦</span>Categorias</button>
        <button class="menu-item" data-menu="recentes"><span>◷</span>Recentes</button>
      </nav>
      <a class="help-pill" href="admin.html"><span>⚙</span> Painel Admin</a>
    </aside>

    <section class="main-area">
      <header class="hero-area">
        <div class="search-wrap">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="Buscar episódios..." />
        </div>
        <div class="hero-text">
          <p>Bem-vindo ao</p>
          <h1>PODSESI</h1>
          <strong>“A voz da nossa escola”</strong>
        </div>
      </header>

      <section class="section-head">
        <h2>Categorias</h2>
        <span>criadas no painel administrativo</span>
      </section>
      <nav id="categoryTabs" class="category-cards"></nav>

      <section class="section-head episodes-title">
        <h2>Episódios em destaque</h2>
        <span>toque no card para ouvir</span>
      </section>
      <section id="episodesGrid" class="episodes-row"></section>
      <div id="emptyState" class="empty-state hidden">
        <h3>Nenhum episódio encontrado</h3>
        <p>Cadastre categorias e episódios no painel administrativo.</p>
      </div>
    </section>
  </main>

  <footer id="playerBar" class="bottom-player hidden">
    <img id="playerCover" src="./assets/logo-podsesi.png" onerror="this.onerror=null;this.src='./logo-podsesi.png';" alt="Capa do episódio" />
    <div class="now-playing">
      <strong id="playerTitle">Selecione um episódio</strong>
      <span id="playerCategory">PODSESI</span>
    </div>
    <div class="center-controls">
      <div class="control-buttons">
        <button id="prevBtn" aria-label="Anterior">⏮</button>
        <button id="playPauseBtn" class="play-main" aria-label="Tocar">▶</button>
        <button id="nextBtn" aria-label="Próximo">⏭</button>
      </div>
      <div class="progress-line">
        <span id="currentTime">00:00</span>
        <input id="progress" type="range" min="0" max="100" value="0" />
        <span id="duration">00:00</span>
      </div>
    </div>
    <div class="volume-area">🔊</div>
    <audio id="audioPlayer"></audio>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
