<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PODSESI Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">
  <div class="bg-photo"></div>
  <main class="tablet-shell">
    <aside class="brand-panel">
      <img src="assets/logo-podsesi.jpeg" alt="PODSESI" class="brand-logo" />
      <h1>PODSESI</h1>
      <p>A voz da nossa escola</p>
      <span>SESI Dom Bosco • São João del Rei</span>
      <a class="admin-link" href="admin.html">Painel Admin</a>
    </aside>

    <section class="content-panel">
      <header class="topbar">
        <div>
          <h2>Escolha um episódio</h2>
          <p>Conecte o headset no tablet e aperte play.</p>
        </div>
        <input id="searchInput" class="search" type="search" placeholder="Buscar episódio..." />
      </header>

      <nav id="categoryTabs" class="category-tabs"></nav>

      <section id="episodesGrid" class="episodes-grid"></section>
      <div id="emptyState" class="empty-state hidden">
        <h3>Nenhum episódio encontrado</h3>
        <p>Cadastre episódios no painel administrativo.</p>
      </div>
    </section>
  </main>

  <footer id="playerBar" class="player-bar hidden">
    <img id="playerCover" src="assets/logo-podsesi.jpeg" alt="Capa" />
    <div class="player-info">
      <strong id="playerTitle">Selecione um episódio</strong>
      <span id="playerCategory">PODSESI</span>
      <div class="progress-line">
        <span id="currentTime">00:00</span>
        <input id="progress" type="range" min="0" max="100" value="0" />
        <span id="duration">00:00</span>
      </div>
    </div>
    <div class="player-actions">
      <button id="prevBtn" aria-label="Anterior">⏮</button>
      <button id="playPauseBtn" class="main-play" aria-label="Tocar">▶</button>
      <button id="nextBtn" aria-label="Próximo">⏭</button>
    </div>
    <audio id="audioPlayer"></audio>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
