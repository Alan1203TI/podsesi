<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PODSESI Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">
  <div class="bg-photo"></div>

  <section id="loginScreen" class="login-card">
    <img class="admin-logo" src="assets/logo-podsesi.png" alt="PODSESI" onerror="this.onerror=null;this.src='logo-podsesi.png';" />
    <h1>Painel PODSESI</h1>
    <p>Gerencie os episódios do PODSESI.</p>
    <input id="passwordInput" type="password" placeholder="Senha do administrador" />
    <button id="loginBtn">Entrar</button>
  </section>

  <main id="adminApp" class="admin-shell hidden">
    <header class="admin-header">
      <div>
        <h1>Painel Administrativo</h1>
        <p>Cadastre, envie e exclua episódios do PODSESI.</p>
      </div>
      <div class="header-actions">
        <a href="index.html">Ver tela dos alunos</a>
        <button id="logoutBtn">Sair</button>
      </div>
    </header>

    <section class="admin-grid single-admin-grid">
      <div class="admin-card">
        <h2>Novo episódio</h2>
        <form id="episodeForm" class="episode-form">
          <label>Título<input id="title" required placeholder="Nome do episódio" /></label>
          <label>Descrição<textarea id="description" rows="3" placeholder="Resumo do áudio"></textarea></label>
          <label>Capa do episódio<input id="coverFile" type="file" accept="image/*" /></label>
          <label>Arquivo MP3/Áudio<input id="audioFile" type="file" accept="audio/*" required /></label>
          <button id="saveEpisodeBtn" type="submit">Enviar episódio</button>
          <div id="uploadStatus" class="upload-status"></div>
        </form>
      </div>
    </section>

    <section class="admin-card episodes-admin-card">
      <h2>Episódios cadastrados</h2>
      <p class="admin-help-text">Os episódios aparecem automaticamente na tela dos alunos em ordem de cadastro, do mais recente para o mais antigo.</p>
      <div id="episodesList" class="manage-list episodes-manage"></div>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
